services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanban-app
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env

  db:
    image: mysql:8.4
    container_name: kanban-db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
